<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parkinson Disease Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      overflow-y: auto;
      max-height: 90vh;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 3px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #5a67d8;
    }

    .result {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Parkinson Detection</h2>

  <div class="input-group"><label>MDVP:Fo(Hz)</label><input type="number" id="fo"></div>
  <div class="input-group"><label>MDVP:Fhi(Hz)</label><input type="number" id="fhi"></div>
  <div class="input-group"><label>MDVP:Flo(Hz)</label><input type="number" id="flo"></div>
  <div class="input-group"><label>Jitter (%)</label><input type="number" step="0.0001" id="jitter"></div>
  <div class="input-group"><label>Jitter Abs</label><input type="number" step="0.0001" id="jitterAbs"></div>
  <div class="input-group"><label>RAP</label><input type="number" step="0.0001" id="rap"></div>
  <div class="input-group"><label>PPQ</label><input type="number" step="0.0001" id="ppq"></div>
  <div class="input-group"><label>DDP</label><input type="number" step="0.0001" id="ddp"></div>
  <div class="input-group"><label>Shimmer</label><input type="number" step="0.0001" id="shimmer"></div>
  <div class="input-group"><label>Shimmer(dB)</label><input type="number" step="0.0001" id="shimmerDb"></div>
  <div class="input-group"><label>APQ3</label><input type="number" step="0.0001" id="apq3"></div>
  <div class="input-group"><label>APQ5</label><input type="number" step="0.0001" id="apq5"></div>
  <div class="input-group"><label>APQ</label><input type="number" step="0.0001" id="apq"></div>
  <div class="input-group"><label>DDA</label><input type="number" step="0.0001" id="dda"></div>
  <div class="input-group"><label>NHR</label><input type="number" step="0.0001" id="nhr"></div>
  <div class="input-group"><label>HNR</label><input type="number" step="0.01" id="hnr"></div>
  <div class="input-group"><label>RPDE</label><input type="number" step="0.0001" id="rpde"></div>
  <div class="input-group"><label>DFA</label><input type="number" step="0.0001" id="dfa"></div>
  <div class="input-group"><label>Spread1</label><input type="number" step="0.0001" id="spread1"></div>
  <div class="input-group"><label>Spread2</label><input type="number" step="0.0001" id="spread2"></div>
  <div class="input-group"><label>D2</label><input type="number" step="0.0001" id="d2"></div>
  <div class="input-group"><label>PPE</label><input type="number" step="0.0001" id="ppe"></div>

  <button onclick="predict()">Predict</button>
  <div class="result" id="result"></div>
</div>

<script>
async function predict() {
    const data = {
        features: [
          parseFloat(document.getElementById("fo").value),
          parseFloat(document.getElementById("fhi").value),
          parseFloat(document.getElementById("flo").value),
          parseFloat(document.getElementById("jitter").value),
          parseFloat(document.getElementById("jitterAbs").value),
          parseFloat(document.getElementById("rap").value),
          parseFloat(document.getElementById("ppq").value),
          parseFloat(document.getElementById("ddp").value),
          parseFloat(document.getElementById("shimmer").value),
          parseFloat(document.getElementById("shimmerDb").value),
          parseFloat(document.getElementById("apq3").value),
          parseFloat(document.getElementById("apq5").value),
          parseFloat(document.getElementById("apq").value),
          parseFloat(document.getElementById("dda").value),
          parseFloat(document.getElementById("nhr").value),
          parseFloat(document.getElementById("hnr").value),
          parseFloat(document.getElementById("rpde").value),
          parseFloat(document.getElementById("dfa").value),
          parseFloat(document.getElementById("spread1").value),
          parseFloat(document.getElementById("spread2").value),
          parseFloat(document.getElementById("d2").value),
          parseFloat(document.getElementById("ppe").value)
        ]
    };

    if (data.features.some(v => isNaN(v))) {
        alert("Please fill all 22 fields!");
        return;
    }

    try {
        const response = await fetch("https://parkinsonmodel.onrender.com/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (!response.ok) {
            alert("Error: " + response.status);
            return;
        }

        const result = await response.json();
        document.getElementById("result").innerText = "Prediction: " + JSON.stringify(result);

    } catch (err) {
        console.error(err);
        alert("Network or backend error. Check console.");
    }
}
</script>

</body>
</html>
