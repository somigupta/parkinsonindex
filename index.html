<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parkinson Disease Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 3px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #5a67d8;
    }

    .result {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Parkinson Detection</h2>

  <!-- Input Fields (based on common dataset features) -->
  <div class="input-group">
    <label>MDVP:Fo(Hz)</label>
    <input type="number" id="fo">
  </div>

  <div class="input-group">
    <label>MDVP:Fhi(Hz)</label>
    <input type="number" id="fhi">
  </div>

  <div class="input-group">
    <label>MDVP:Flo(Hz)</label>
    <input type="number" id="flo">
  </div>

  <div class="input-group">
    <label>Jitter (%)</label>
    <input type="number" step="0.0001" id="jitter">
  </div>

  <div class="input-group">
    <label>Shimmer</label>
    <input type="number" step="0.0001" id="shimmer">
  </div>

  <div class="input-group">
    <label>NHR</label>
    <input type="number" step="0.0001" id="nhr">
  </div>

  <div class="input-group">
    <label>HNR</label>
    <input type="number" step="0.01" id="hnr">
  </div>

  <button onclick="predict()">Predict</button>

  <div class="result" id="result"></div>
</div>

<script>
const apiUrl = "https://parkinsonmodel.onrender.com/predict"; // replace this

async function predict() {
  const data = {
    fo: parseFloat(document.getElementById("fo").value),
    fhi: parseFloat(document.getElementById("fhi").value),
    flo: parseFloat(document.getElementById("flo").value),
    jitter: parseFloat(document.getElementById("jitter").value),
    shimmer: parseFloat(document.getElementById("shimmer").value),
    nhr: parseFloat(document.getElementById("nhr").value),
    hnr: parseFloat(document.getElementById("hnr").value)
  };

  try {
    const response = await fetch(apiUrl, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
      "Prediction: " + (result.prediction || JSON.stringify(result));

  } catch (error) {
    document.getElementById("result").innerText =
      "Error connecting to backend.";
    console.error(error);
  }
}
</script>

</body>
</html>
