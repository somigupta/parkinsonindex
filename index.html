<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parkinson Disease Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 3px;
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #5a67d8;
    }

    .result {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Parkinson Detection</h2>

  <!-- Input Fields (based on common dataset features) -->
  <div class="input-group">
    <label>MDVP:Fo(Hz)</label>
    <input type="number" id="fo">
  </div>

  <div class="input-group">
    <label>MDVP:Fhi(Hz)</label>
    <input type="number" id="fhi">
  </div>

  <div class="input-group">
    <label>MDVP:Flo(Hz)</label>
    <input type="number" id="flo">
  </div>

  <div class="input-group">
    <label>Jitter (%)</label>
    <input type="number" step="0.0001" id="jitter">
  </div>

  <div class="input-group">
    <label>Shimmer</label>
    <input type="number" step="0.0001" id="shimmer">
  </div>

  <div class="input-group">
    <label>NHR</label>
    <input type="number" step="0.0001" id="nhr">
  </div>

  <div class="input-group">
    <label>HNR</label>
    <input type="number" step="0.01" id="hnr">
  </div>

  <button onclick="predict()">Predict</button>

  <div class="result" id="result"></div>
</div>

<button onclick="predict()">Predict</button>

  <script>
    async function predict() {
      const data = {
        features: [
          parseFloat(document.getElementById("fo").value),
          parseFloat(document.getElementById("fhi").value),
          parseFloat(document.getElementById("flo").value),
          parseFloat(document.getElementById("jitter").value),
          parseFloat(document.getElementById("jitterAbs").value),
          parseFloat(document.getElementById("rap").value),
          parseFloat(document.getElementById("ppq").value),
          parseFloat(document.getElementById("ddp").value),
          parseFloat(document.getElementById("shimmer").value),
          parseFloat(document.getElementById("shimmerDb").value),
          parseFloat(document.getElementById("apq3").value),
          parseFloat(document.getElementById("apq5").value),
          parseFloat(document.getElementById("apq").value),
          parseFloat(document.getElementById("dda").value),
          parseFloat(document.getElementById("nhr").value),
          parseFloat(document.getElementById("hnr").value),
          parseFloat(document.getElementById("rpde").value),
          parseFloat(document.getElementById("dfa").value),
          parseFloat(document.getElementById("spread1").value),
          parseFloat(document.getElementById("spread2").value),
          parseFloat(document.getElementById("d2").value),
          parseFloat(document.getElementById("ppe").value)
        ]
      };

      const response = await fetch("YOUR_API_ENDPOINT/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();
      alert("Prediction: " + JSON.stringify(result));
    }
  </script>

</body>
</html>
