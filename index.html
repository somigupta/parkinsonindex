<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parkinson Disease Detection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input[type="file"] {
      margin: 15px 0;
    }

    button {
      background: #4facfe;
      border: none;
      padding: 10px 20px;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00c6ff;
    }

    .result {
      margin-top: 20px;
      font-weight: bold;
      color: #444;
    }

    img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 8px;
      display: none;
    }

    .loader {
      display: none;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Parkinson Detection</h2>
    <input type="file" id="imageInput" accept="image/*" />
    <br />
    <button onclick="uploadImage()">Analyze</button>

    <div class="loader" id="loader">Processing...</div>
    <img id="preview" />
    <div class="result" id="result"></div>
  </div>

  <script>
    const apiUrl = "https://parkinsonmodel.onrender.com/predict"; // Replace with your backend API

    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultDiv = document.getElementById("result");
    const loader = document.getElementById("loader");

    imageInput.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        resultDiv.innerText = "";
      }
    });

    async function uploadImage() {
      const file = imageInput.files[0];

      if (!file) {
        alert("Please select an image first.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      loader.style.display = "block";
      resultDiv.innerText = "";

      try {
        const response = await fetch(apiUrl, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        loader.style.display = "none";

        // Adjust based on your API response structure
        resultDiv.innerText = "Result: " + (data.prediction || "Unknown");

      } catch (error) {
        loader.style.display = "none";
        resultDiv.innerText = "Error: Unable to process image.";
        console.error(error);
      }
    }
  </script>
</body>
</html>
